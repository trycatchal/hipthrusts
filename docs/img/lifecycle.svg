<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 380" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="lfGray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#768390"/>
    </marker>
    <marker id="lfRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#f85149"/>
    </marker>
    <marker id="lfGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#2ea043"/>
    </marker>
  </defs>

  <text x="40" y="42" font-size="19" font-weight="600" fill="#768390">Every endpoint, the same eight stages — run in this order, every time</text>

  <!-- ===== Stage boxes: x = 40 + n*154, w = 138, y = 96, h = 64 ===== -->

  <!-- 1 extractAmbient (optional) -->
  <rect x="40" y="96" width="138" height="64" rx="9" fill="#76839010" stroke="#768390" stroke-width="1.4" stroke-dasharray="5 4"/>
  <text x="109" y="122" font-size="12.5" font-weight="600" fill="#768390" text-anchor="middle">extractAmbient</text>
  <text x="109" y="142" font-size="10.5" fill="#768390" text-anchor="middle">trusted ambient in</text>

  <!-- 2 extractInputs (optional) -->
  <rect x="194" y="96" width="138" height="64" rx="9" fill="#76839010" stroke="#768390" stroke-width="1.4" stroke-dasharray="5 4"/>
  <text x="263" y="122" font-size="12.5" font-weight="600" fill="#768390" text-anchor="middle">extractInputs</text>
  <text x="263" y="142" font-size="10.5" fill="#768390" text-anchor="middle">adapter shaping</text>

  <!-- 3 sanitizeInputs (required) -->
  <rect x="348" y="96" width="138" height="64" rx="9" fill="#76839014" stroke="#768390" stroke-width="2.2"/>
  <text x="417" y="122" font-size="12.5" font-weight="600" fill="#768390" text-anchor="middle">sanitizeInputs</text>
  <text x="417" y="142" font-size="10.5" fill="#768390" text-anchor="middle">validate untrusted</text>

  <!-- 4 preAuthorize (required) -->
  <rect x="502" y="96" width="138" height="64" rx="9" fill="#76839014" stroke="#768390" stroke-width="2.2"/>
  <text x="571" y="122" font-size="12.5" font-weight="600" fill="#768390" text-anchor="middle">preAuthorize</text>
  <text x="571" y="142" font-size="10.5" fill="#768390" text-anchor="middle">cheap check, pre-DB</text>

  <!-- 5 loadResources (optional) -->
  <rect x="656" y="96" width="138" height="64" rx="9" fill="#76839010" stroke="#768390" stroke-width="1.4" stroke-dasharray="5 4"/>
  <text x="725" y="122" font-size="12.5" font-weight="600" fill="#768390" text-anchor="middle">loadResources</text>
  <text x="725" y="142" font-size="10.5" fill="#768390" text-anchor="middle">fetch the resource</text>

  <!-- 6 finalAuthorize (required) -->
  <rect x="810" y="96" width="138" height="64" rx="9" fill="#76839014" stroke="#768390" stroke-width="2.2"/>
  <text x="879" y="122" font-size="12.5" font-weight="600" fill="#768390" text-anchor="middle">finalAuthorize</text>
  <text x="879" y="142" font-size="10.5" fill="#768390" text-anchor="middle">ownership check</text>

  <!-- 7 execute (required) -->
  <rect x="964" y="96" width="138" height="64" rx="9" fill="#76839014" stroke="#768390" stroke-width="2.2"/>
  <text x="1033" y="122" font-size="12.5" font-weight="600" fill="#768390" text-anchor="middle">execute</text>
  <text x="1033" y="142" font-size="10.5" fill="#768390" text-anchor="middle">do the work</text>

  <!-- 8 redactResponse (required) -->
  <rect x="1118" y="96" width="138" height="64" rx="9" fill="#76839014" stroke="#768390" stroke-width="2.2"/>
  <text x="1187" y="122" font-size="12.5" font-weight="600" fill="#768390" text-anchor="middle">redactResponse</text>
  <text x="1187" y="142" font-size="10.5" fill="#768390" text-anchor="middle">strip secrets</text>

  <!-- ===== Flow arrows between boxes (y = 128) ===== -->
  <line x1="178" y1="128" x2="192" y2="128" stroke="#768390" stroke-width="2" marker-end="url(#lfGray)"/>
  <line x1="332" y1="128" x2="346" y2="128" stroke="#768390" stroke-width="2" marker-end="url(#lfGray)"/>
  <line x1="486" y1="128" x2="500" y2="128" stroke="#768390" stroke-width="2" marker-end="url(#lfGray)"/>
  <line x1="640" y1="128" x2="654" y2="128" stroke="#768390" stroke-width="2" marker-end="url(#lfGray)"/>
  <line x1="794" y1="128" x2="808" y2="128" stroke="#768390" stroke-width="2" marker-end="url(#lfGray)"/>
  <line x1="948" y1="128" x2="962" y2="128" stroke="#768390" stroke-width="2" marker-end="url(#lfGray)"/>
  <line x1="1102" y1="128" x2="1116" y2="128" stroke="#768390" stroke-width="2" marker-end="url(#lfGray)"/>

  <!-- ===== Rejections drop out; the happy path ends in a safe response ===== -->

  <!-- sanitizeInputs: invalid input → 422 -->
  <line x1="417" y1="160" x2="417" y2="208" stroke="#f85149" stroke-width="2" marker-end="url(#lfRed)"/>
  <rect x="360" y="212" width="114" height="24" rx="12" fill="#f8514912" stroke="#f85149" stroke-width="1.5"/>
  <text x="417" y="228" font-size="11.5" font-weight="600" fill="#f85149" text-anchor="middle">invalid → 422</text>

  <!-- preAuthorize: deny → 403 -->
  <line x1="571" y1="160" x2="571" y2="208" stroke="#f85149" stroke-width="2" marker-end="url(#lfRed)"/>
  <rect x="516" y="212" width="110" height="24" rx="12" fill="#f8514912" stroke="#f85149" stroke-width="1.5"/>
  <text x="571" y="228" font-size="11.5" font-weight="600" fill="#f85149" text-anchor="middle">false → 403</text>

  <!-- loadResources: missing → 404 -->
  <line x1="725" y1="160" x2="725" y2="208" stroke="#f85149" stroke-width="2" marker-end="url(#lfRed)"/>
  <rect x="666" y="212" width="118" height="24" rx="12" fill="#f8514912" stroke="#f85149" stroke-width="1.5"/>
  <text x="725" y="228" font-size="11.5" font-weight="600" fill="#f85149" text-anchor="middle">missing → 404</text>

  <!-- finalAuthorize: deny → 403 -->
  <line x1="879" y1="160" x2="879" y2="208" stroke="#f85149" stroke-width="2" marker-end="url(#lfRed)"/>
  <rect x="824" y="212" width="110" height="24" rx="12" fill="#f8514912" stroke="#f85149" stroke-width="1.5"/>
  <text x="879" y="228" font-size="11.5" font-weight="600" fill="#f85149" text-anchor="middle">false → 403</text>

  <!-- redactResponse: safe response -->
  <line x1="1187" y1="160" x2="1187" y2="208" stroke="#2ea043" stroke-width="2.5" marker-end="url(#lfGreen)"/>
  <rect x="1120" y="212" width="134" height="24" rx="12" fill="#2ea04312" stroke="#2ea043" stroke-width="1.8"/>
  <text x="1187" y="228" font-size="11.5" font-weight="600" fill="#2ea043" text-anchor="middle">safe response ✓</text>

  <!-- ===== Context accumulation strip ===== -->
  <text x="40" y="278" font-size="12.5" fill="#a371f7">ctx grows left to right: <tspan font-family="Consolas, monospace">ambient</tspan> → + <tspan font-family="Consolas, monospace">inputs</tspan> → + authorizer contributions → + loaded resources — every stage sees everything earlier stages produced, fully typed.</text>

  <!-- ===== Legend + punchline ===== -->
  <rect x="40" y="304" width="22" height="14" rx="4" fill="#76839014" stroke="#768390" stroke-width="2"/>
  <text x="70" y="316" font-size="12.5" fill="#768390">required</text>
  <rect x="150" y="304" width="22" height="14" rx="4" fill="#76839010" stroke="#768390" stroke-width="1.2" stroke-dasharray="4 3"/>
  <text x="180" y="316" font-size="12.5" fill="#768390">optional</text>
  <text x="262" y="316" font-size="12.5" fill="#768390">·&#160;&#160;rejections are thrown <tspan font-family="Consolas, monospace">HipError</tspan>s, mapped to transport responses by the adapter</text>

  <text x="40" y="352" font-size="14.5" font-weight="600" fill="#768390">A handler missing any required stage is a compile error — the dangerous shortcut cannot ship.</text>
</svg>
